name: build-versions

# Every push to main that changes the page is auto-captured as a version,
# so admin.html (/admin) always shows the latest pushes without manual steps.
on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: build-versions
  cancel-in-progress: false

jobs:
  versions:
    # skip the bot's own version commits (they carry [skip ci])
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # build_versions.py walks full git history

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Regenerate versions.json + snapshots + tags
        run: python3 build_versions.py

      - name: Commit + push if anything changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A versions.json versions
          if git diff --cached --quiet; then
            echo "No version changes — nothing to commit."
          else
            git commit -m "chore: auto-regenerate versions + snapshots [skip ci]"
            git push
            git push --force origin --tags
          fi
